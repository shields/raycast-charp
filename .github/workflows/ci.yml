name: CI

on:
  push:
    branches: ["**"]

# Least privilege by default; this workflow only reads the repo.
permissions:
  contents: read

# Cancel superseded runs on a branch, but never cancel main.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  test:
    # The explicit name keeps the check context stable for branch protection.
    name: test
    # Charp is a macOS-only Raycast extension, so lint and test on macOS.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24 # match the Node runtime @raycast/api targets
          cache: npm
      - run: npm ci
      # generate-data.ts downloads the Unicode + FineFreq sources into data/ on
      # first run and reuses them afterward. Cache that directory so CI does not
      # refetch ~12 MB from unicode.org and Hugging Face every run; the script
      # hash keys the cache, so bumping the Unicode version busts it.
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: data
          key: charp-data-${{ hashFiles('scripts/generate-data.ts') }}
      - run: make lint
      - run: make typecheck
      - run: make coverage

  build:
    name: build
    # Validate that the extension bundles via `ray build` (does not publish).
    runs-on: macos-26
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24 # match the Node runtime @raycast/api targets
          cache: npm
      - run: npm ci
      # Same key as the test job: restore the shared Unicode/FineFreq data cache.
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: data
          key: charp-data-${{ hashFiles('scripts/generate-data.ts') }}
      - run: make build
