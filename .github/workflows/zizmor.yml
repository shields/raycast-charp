name: zizmor

on:
  push:
    branches: ["**"]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  zizmor:
    name: zizmor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      # zizmorcore is zizmor's official org (woodruffw/zizmor redirects
      # there); zizmorcore/zizmor-action is the action docs.zizmor.sh
      # recommends, not a typosquat.
      - uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
        with:
          persona: pedantic
          # Fail the job on findings with inline annotations instead of
          # uploading SARIF to the Security tab, so branch protection gates
          # on a clean audit.
          advanced-security: false
          annotations: true
